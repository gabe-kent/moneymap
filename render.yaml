databases:
  - name: moneymap-db
    plan: basic-256mb
    postgresMajorVersion: "16"

services:
  - type: web
    name: moneymap
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /up
    preDeployCommand: bin/rails db:migrate
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: moneymap-db
          property: connectionString

  - type: worker
    name: moneymap-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: bin/jobs
    plan: starter
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: moneymap-db
          property: connectionString
